<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOUISIX</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Space Grotesk',sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}

.background{
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at 20% 20%,rgba(0,217,255,.15),transparent 35%),
radial-gradient(circle at 80% 80%,rgba(140,82,255,.15),transparent 35%);
animation:bgMove 12s infinite alternate ease-in-out;
}

@keyframes bgMove{
from{transform:scale(1);}
to{transform:scale(1.15);}
}

#intro{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
animation:introFade 3.5s forwards;
}

#intro img{
width:280px;
max-width:80%;
animation:logoIntro 3s ease forwards;
}

@keyframes logoIntro{
0%{opacity:0;transform:scale(.5);}
50%{opacity:1;transform:scale(1.08);}
100%{opacity:1;transform:scale(1);}
}

@keyframes introFade{
0%,80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.04);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:1000;
}

.logo img{
height:60px;
}

nav ul{
display:flex;
list-style:none;
gap:24px;
}

nav a{
text-decoration:none;
color:white;
font-size:14px;
letter-spacing:2px;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero-logo{
width:220px;
margin-bottom:25px;
animation:floatLogo 4s infinite ease-in-out;
}

@keyframes floatLogo{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.hero h1{
font-family:'Cinzel',serif;
font-size:82px;
letter-spacing:8px;
background:linear-gradient(90deg,#fff,#d7d7d7,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:15px;
opacity:.8;
letter-spacing:3px;
}

.btn{
display:inline-block;
margin-top:35px;
padding:15px 40px;
border:1px solid rgba(255,255,255,.2);
text-decoration:none;
color:white;
backdrop-filter:blur(10px);
background:rgba(255,255,255,.05);
transition:.4s;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 0 25px rgba(0,217,255,.45);
}

.section{
padding:110px 8%;
}

.section-title{
font-family:'Cinzel',serif;
font-size:42px;
text-align:center;
margin-bottom:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
overflow:hidden;
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px rgba(0,217,255,.2);
}

.card img{
width:100%;
height:340px;
object-fit:cover;
}

.card h3{
padding:20px;
}

.about{
max-width:800px;
margin:auto;
text-align:center;
line-height:1.8;
color:#ccc;
}

footer{
padding:40px;
text-align:center;
border-top:1px solid rgba(255,255,255,.08);
color:#aaa;
}

.reveal{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

@media(max-width:768px){
.hero h1{
font-size:48px;
}
.hero-logo{
width:160px;
}
.logo img{
height:48px;
}
}
</style></head><body><div class="background"></div><div id="intro">
<img src="file_0000000050b8722f82fa33b1a8f67752.png">
</div><nav>
<div class="logo">
<img src="file_0000000050b8722f82fa33b1a8f67752.png">
</div><ul>
<li><a href="#">HOME</a></li>
<li><a href="#collection">COLLECTION</a></li>
<li><a href="#about">ABOUT</a></li>
</ul>
</nav><section class="hero">
<img class="hero-logo" src="file_0000000050b8722f82fa33b1a8f67752.png"><h1>LOUISIX</h1>
<p>FUTURE OF LUXURY STREETWEAR</p><a href="#collection" class="btn">
EXPLORE
</a>
</section><section class="section reveal" id="collection">
<h2 class="section-title">COLLECTION</h2><div class="grid"><div class="card">
<img src="https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=1200">
<h3>Chrome Vision</h3>
</div><div class="card">
<img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=1200">
<h3>Luxury Future</h3>
</div><div class="card">
<img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=1200">
<h3>Y2K Elite</h3>
</div></div>
</section><section class="section reveal" id="about">
<h2 class="section-title">ABOUT</h2><div class="about">
LOUISIX adalah luxury fashion label dengan identitas chrome Y2K, futuristik, premium, dan modern.
</div>
</section><footer>
© 2026 LOUISIX
</footer><script>
const reveals=document.querySelectorAll('.reveal');

window.addEventListener('scroll',()=>{
reveals.forEach(el=>{
const top=el.getBoundingClientRect().top;
if(top<window.innerHeight-100){
el.classList.add('active');
}
});
});
</script></body>
</html>
