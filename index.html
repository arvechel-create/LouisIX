<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LOUISIX X ARCHIVE SYSTEM V3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
body{background:#000;color:#fff;font-family: 'Courier New', Courier, monospace; overflow-x:hidden}

/* Overlay Classified */
#classified-overlay {
    position: fixed; inset: 0; background: #000; z-index: 10001;
    display: flex; align-items: center; justify-content: center;
    text-align: center; color: #0f0;
}
.classified-content { border: 1px solid #0f0; padding: 40px; max-width: 500px; }
.classified-content h1 { letter-spacing: 5px; margin-bottom: 20px; text-shadow: 0 0 10px #0f0; }
.classified-btn { 
    background: transparent; border: 1px solid #0f0; color: #0f0; 
    padding: 10px 20px; margin: 10px; cursor: pointer; font-family: inherit; 
}
.classified-btn:hover { background: #0f0; color: #000; }

/* Styles lainnya tetap sama */
body:before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.035;z-index:-1;background:repeating-linear-gradient(0deg,rgba(255,255,255,.12) 0px,rgba(255,255,255,.12) 1px,transparent 2px,transparent 4px);}
body:after{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle,transparent 40%,rgba(0,0,0,.45) 100%);z-index:-1;}
video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:-1}
#boot{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999}
nav{position:sticky;top:0;z-index:999;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);padding:12px 16px;display:flex;align-items:center;justify-content:flex-start;gap:20px;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav a{color:#fff;text-decoration:none;font-size:14px;font-weight:500;flex-shrink:0}
section{padding:80px 8%}
.room{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);padding:24px;border-radius:22px;backdrop-filter:blur(12px)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.hero img{width:240px}
.btn{padding:10px 16px;background:none;border:1px solid #fff;color:#fff;cursor:pointer}
.gallery img,.viewer img{width:100%;border-radius:18px}
.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.drawer{position:fixed;right:0;top:0;width:320px;height:100%;background:#111;padding:20px;transform:translateX(100%);transition:.3s;overflow:auto}
.open{transform:translateX(0)}
input,select{width:100%;padding:10px;margin:5px 0;background:#111;color:#fff;border:1px solid #333}
#mobileMenu{display:flex;gap:20px}
.menuBtn{display:none;background:none;border:none;color:white;font-size:24px}
@media(max-width:768px){
.grid{grid-template-columns:1fr}
.menuBtn{display:block}
#mobileMenu{display:none;flex-direction:column;position:absolute;top:60px;left:0;width:100%;background:#000;padding:15px}
#mobileMenu.show{display:flex}
.hero h1{font-size:42px}
.hero h3{font-size:24px}
}
.glitch{position:relative;font-size:64px;font-weight:900;letter-spacing:4px;animation:glitch 1s infinite;}
.glitch:before,.glitch:after{content:'LOUISIX X';position:absolute;left:0;top:0;width:100%;overflow:hidden;}
.glitch:before{left:2px;text-shadow:-2px 0 red;animation:glitchTop 1s infinite;}
.glitch:after{left:-2px;text-shadow:2px 0 cyan;animation:glitchBottom 1s infinite;}
@keyframes glitch{0%,100%{transform:translate(0)} 20%{transform:translate(-2px,2px)} 40%{transform:translate(2px,-2px)} 60%{transform:translate(-2px,0)} 80%{transform:translate(2px,0)}}
@keyframes glitchTop{0%,100%{clip-path:inset(0 0 70% 0)} 50%{clip-path:inset(0 0 30% 0)}}
@keyframes glitchBottom{0%,100%{clip-path:inset(70% 0 0 0)} 50%{clip-path:inset(30% 0 0 0)}}
.noise{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:10000;background:repeating-linear-gradient(0deg,rgba(255,255,255,.04) 0px,rgba(255,255,255,.04) 1px,transparent 2px,transparent 4px);}
.noise.flash{animation:noiseFlash .08s linear;}
@keyframes noiseFlash{0%{opacity:0} 50%{opacity:.18} 100%{opacity:0}}
</style>
</head>
<body>

<!-- Overlay Classified -->
<div id="classified-overlay">
    <div class="classified-content">
        <h1>⚠ CLASSIFIED FILE</h1>
        <p>UNAUTHORIZED ACCESS IS PROHIBITED</p><br>
        <p>This system contains confidential information.<br>All activities are monitored and logged.</p><br>
        <button class="classified-btn" onclick="document.getElementById('classified-overlay').style.display='none'">[ ACCEPT ]</button>
        <button class="classified-btn" onclick="window.location.href='https://google.com'">[ LEAVE ]</button>
    </div>
</div>

<div id="boot"><h1>LOUISIX X</h1><p style="opacity:.5;letter-spacing:3px">OPERATE IN SILENCE</p></div><div class="noise" id="noise"></div>

<!-- Sisa struktur lainnya tetap sama -->
... (konten web Anda) ...

<script>
// Fungsi yang sudah ada + tambahan
setTimeout(()=>{noise.classList.add('flash');},800);
setTimeout(()=>{boot.style.opacity='0';},1500);
setTimeout(()=>{boot.style.display='none';},2000);

function toggleMenu(){mobileMenu.classList.toggle("show");}
function toggleCart(){event.preventDefault();cartDrawer.classList.toggle('open');}
function addCart(){cartContent.innerHTML='GLITCH I | '+color.value+' | '+size.value+' | Qty '+qty.value;localStorage.setItem('cart',cartContent.innerHTML);}
function saveWishlist(){wishBox.innerHTML='GLITCH I';localStorage.setItem('wish','GLITCH I');}
function checkout(){let msg='GLITCH I '+color.value+' '+size.value+' Qty '+qty.value+' Name '+name.value;window.open('https://wa.me/?text='+encodeURIComponent(msg));}
</script>
</body>
</html>
